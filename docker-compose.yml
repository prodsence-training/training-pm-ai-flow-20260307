version: '3.8'

# 快速開發環境配置 - 即時構建
# 使用: docker compose up
# 首次會自動 build images，之後可以重複使用

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - jira-dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - jira-dashboard-network

networks:
  jira-dashboard-network:
    driver: bridge
